<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard สถิติการวิ่ง</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

    <!-- แถบเมนูด้านบน -->
    <nav class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Running Dashboard
            </h1>
            <div class="flex items-center gap-4">
                <div class="text-sm font-medium text-blue-100 hidden md:block" id="last-updated">กำลังโหลดข้อมูล...</div>
                <button onclick="refreshData()" class="bg-white text-blue-600 px-4 py-2 rounded-full shadow-md text-sm font-bold hover:bg-gray-100 transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    รีเฟรชข้อมูล
                </button>
            </div>
        </div>
    </nav>

    <!-- หน้าจอโหลดข้อมูล -->
    <div id="loading" class="flex flex-col justify-center items-center h-64 mt-10">
        <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-16 w-16 mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-600">กำลังซิงค์ข้อมูลจาก Sheets...</h2>
    </div>

    <!-- เนื้อหา Dashboard (ซ่อนไว้จนกว่าจะโหลดเสร็จ) -->
    <div id="dashboard-content" class="max-w-7xl mx-auto px-4 py-8 hidden">
        
        <!-- การ์ดสรุปผล (KPIs) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-blue-500 transform transition hover:-translate-y-1">
                <h3 class="text-sm font-medium text-gray-500 mb-1">ระยะทางรวมทั้งหมด (กม.)</h3>
                <div class="text-4xl font-bold text-gray-800" id="kpi-total-distance">0.00</div>
            </div>
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-green-500 transform transition hover:-translate-y-1">
                <h3 class="text-sm font-medium text-gray-500 mb-1">นักวิ่งที่ระยะทางเยอะที่สุด</h3>
                <div class="text-3xl font-bold text-gray-800" id="kpi-top-runner">-</div>
                <div class="text-sm text-green-600 font-bold mt-1 bg-green-50 inline-block px-2 py-1 rounded-lg" id="kpi-top-distance">0.00 กม.</div>
            </div>
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-purple-500 transform transition hover:-translate-y-1">
                <h3 class="text-sm font-medium text-gray-500 mb-1">จำนวนนักวิ่งทั้งหมด (คน)</h3>
                <div class="text-4xl font-bold text-gray-800" id="kpi-total-runners">0</div>
            </div>
        </div>

        <!-- กราฟ -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- กราฟแท่ง Leaderboard -->
            <div class="bg-white rounded-xl shadow p-6">
                <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
                    🏆 Leaderboard
                </h2>
                <canvas id="barChart" height="250"></canvas>
            </div>
            
            <!-- กราฟเส้น แนวโน้มรายวัน -->
            <div class="bg-white rounded-xl shadow p-6">
                <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
                    📈 แนวโน้มการวิ่งรายวัน
                </h2>
                <canvas id="lineChart" height="250"></canvas>
            </div>
        </div>

        <!-- ตารางข้อมูล -->
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex flex-col md:flex-row justify-between items-center bg-gray-50">
                <h2 class="text-lg font-bold text-gray-700">ตารางสถิติรายวัน</h2>
                <span class="text-xs font-medium text-red-500 bg-red-50 px-2 py-1 rounded-full mt-2 md:mt-0">*ระบบซ่อนแถว "รวม" อัตโนมัติเพื่อไม่ให้กราฟเพี้ยน</span>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200" id="data-table">
                    <thead class="bg-gray-100" id="table-head">
                        <!-- สร้างด้วย Javascript -->
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200 text-sm" id="table-body">
                        <!-- สร้างด้วย Javascript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sheetId = '1hBZ3083B2RrPkbHouKzT1m-qozZVJkx_wDd-2H097vI';
        let barChartInstance = null;
        let lineChartInstance = null;

        const colors = [
            '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', 
            '#ec4899', '#06b6d4', '#84cc16', '#6366f1', '#f43f5e',
            '#14b8a6', '#eab308', '#d946ef', '#0ea5e9'
        ];

        // สร้าง Object จำลองเพื่อรับข้อมูลจากระบบของ Google (แก้ปัญหาโหลดค้าง 100%)
        window.google = {
            visualization: {
                Query: {
                    setResponse: function(response) {
                        handleGoogleSheet(response);
                    }
                }
            }
        };

        // เริ่มโหลดข้อมูลครั้งแรก
        refreshData();

        // ฟังก์ชันเริ่มโหลดและฝัง Script (JSONP) เพื่อหลบการบล็อก CORS ของเบราว์เซอร์
        function refreshData() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('dashboard-content').classList.add('hidden');
            
            // ลบสคริปต์เก่าออกถ้ามี (เพื่อให้โหลดใหม่ได้)
            const oldScript = document.getElementById('gviz-script');
            if (oldScript) oldScript.remove();

            // สร้างสคริปต์ใหม่ โหลดผ่าน API ของ Google พร้อมพารามิเตอร์ป้องกัน Caching
            const script = document.createElement('script');
            script.id = 'gviz-script';
            
            // แก้ไขพารามิเตอร์ให้ตรงกับรูปแบบของ Google API
            script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:handleGoogleSheet&headers=1&t=${new Date().getTime()}`;
            
            script.onerror = () => {
                showError('ไม่สามารถเชื่อมต่อ Google Sheets ได้ โปรดตรวจสอบอินเทอร์เน็ต');
            };
            
            document.head.appendChild(script);
        }

        // ฟังก์ชันรับข้อมูลที่ Google ตอบกลับมา
        function handleGoogleSheet(response) {
            if (!response || response.status === 'error') {
                showError('เกิดข้อผิดพลาด หรือไฟล์ยังไม่ได้เปิดสิทธิ์ "ทุกคนที่มีลิงก์"');
                return;
            }
            
            try {
                const table = response.table;
                const rawCols = table.cols;
                const rawRows = table.rows;
                
                // ดึงหัวคอลัมน์ (กรณีช่องว่าง ให้ข้ามไป)
                const headers = rawCols.map((c, i) => (c && c.label ? c.label : `Col_${i}`));
                
                // แยกชื่อคนวิ่ง พร้อมจำตำแหน่ง Index ว่าอยู่คอลัมน์ที่เท่าไหร่ (ป้องกันกรณีมีคอลัมน์ว่างแทรก)
                const runners = [];
                const runnerIndices = [];
                headers.forEach((h, i) => {
                    if (i > 0 && h && h.trim() !== '' && !h.startsWith('Col_')) {
                        runners.push(h.trim());
                        runnerIndices.push(i);
                    }
                });
                
                const cleanData = [];
                let totalDistance = 0;
                let runnerTotals = {};
                runners.forEach(r => runnerTotals[r] = 0);
                
                // วนลูปอ่านข้อมูลทีละแถว
                rawRows.forEach(row => {
                    let cellDate = row.c[0]; // คอลัมน์แรก (วันที่)
                    let dateVal = cellDate ? (cellDate.f || cellDate.v || '').toString().trim() : '';
                    
                    // ข้ามแถวที่วันที่ว่าง หรือเป็นแถวผลรวม
                    if (!dateVal || dateVal === '' || dateVal.includes('รวม') || dateVal.includes('Total') || dateVal.includes('sum')) {
                        return;
                    }
                    
                    let rowData = { date: dateVal };
                    let hasDataInRow = false;
                    
                    runners.forEach((runner, idx) => {
                        let originalIndex = runnerIndices[idx];
                        let cell = row.c[originalIndex];
                        let valRaw = cell ? (cell.v !== null && cell.v !== undefined ? cell.v : 0) : 0;
                        let valNum = parseFloat(valRaw);
                        if (isNaN(valNum)) valNum = 0;
                        
                        rowData[runner] = valNum;
                        
                        if (valNum > 0) hasDataInRow = true;
                        
                        runnerTotals[runner] += valNum;
                        totalDistance += valNum;
                    });
                    
                    // เก็บเฉพาะแถวที่มีข้อมูลวิ่ง หรือมีวันที่
                    if (hasDataInRow || dateVal) {
                        cleanData.push(rowData);
                    }
                });
                
                renderDashboard(cleanData, runners, runnerTotals, totalDistance);
                
            } catch (err) {
                console.error(err);
                showError('เกิดข้อผิดพลาดในการประมวลผลข้อมูล โปรดตรวจสอบรูปแบบใน Sheet');
            }
        }

        // ฟังก์ชันแสดงข้อความ Error ให้ผู้ใช้เห็นชัดๆ
        function showError(msg) {
            document.getElementById('loading').innerHTML = `
                <div class="text-red-600 font-bold text-center bg-red-50 p-8 rounded-2xl border-2 border-red-200 max-w-lg mx-auto shadow-sm">
                    <svg class="w-16 h-16 mx-auto mb-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <span class="text-xl">${msg}</span>
                </div>`;
        }

        // ฟังก์ชันวาดหน้าจอ แดชบอร์ด
        function renderDashboard(cleanData, runners, runnerTotals, totalDistance) {
            // หาคนวิ่งเยอะสุด
            let topRunner = '-';
            let topDistance = 0;
            for (const [runner, distance] of Object.entries(runnerTotals)) {
                if (distance > topDistance) {
                    topDistance = distance;
                    topRunner = runner;
                }
            }

            // ใส่ข้อมูลลงการ์ดสรุปผล
            document.getElementById('kpi-total-distance').innerText = totalDistance.toFixed(2);
            document.getElementById('kpi-top-runner').innerText = topRunner.toUpperCase();
            document.getElementById('kpi-top-distance').innerText = `${topDistance.toFixed(2)} กม.`;
            document.getElementById('kpi-total-runners').innerText = runners.length;

            const now = new Date();
            document.getElementById('last-updated').innerText = `อัปเดตล่าสุด: ${now.toLocaleTimeString('th-TH')}`;

            // --- วาดกราฟแท่ง (เรียงจากมากไปน้อย) ---
            const sortedRunners = [...runners].sort((a, b) => runnerTotals[b] - runnerTotals[a]);
            const barData = sortedRunners.map(r => runnerTotals[r]);

            if (barChartInstance) barChartInstance.destroy(); // ล้างกราฟเก่าออกก่อนเผื่อกดรีเฟรช
            const ctxBar = document.getElementById('barChart').getContext('2d');
            barChartInstance = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: sortedRunners.map(r => r.toUpperCase()),
                    datasets: [{
                        label: 'ระยะทางรวม (กม.)',
                        data: barData,
                        backgroundColor: '#3b82f6',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // --- วาดกราฟเส้น ---
            const labels = cleanData.map(row => row.date);
            const lineDatasets = runners.map((runner, index) => {
                return {
                    label: runner,
                    data: cleanData.map(row => row[runner]),
                    borderColor: colors[index % colors.length],
                    backgroundColor: colors[index % colors.length] + '30',
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointHoverRadius: 6
                };
            });

            if (lineChartInstance) lineChartInstance.destroy(); // ล้างกราฟเก่าออกก่อน
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            lineChartInstance = new Chart(ctxLine, {
                type: 'line',
                data: { labels: labels, datasets: lineDatasets },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { family: 'Prompt' } } } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // --- สร้างตาราง ---
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            
            let headHTML = '<tr><th class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider bg-gray-200">วันที่</th>';
            runners.forEach(runner => {
                headHTML += `<th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase tracking-wider">${runner}</th>`;
            });
            headHTML += '</tr>';
            thead.innerHTML = headHTML;

            let bodyHTML = '';
            cleanData.forEach(row => {
                bodyHTML += '<tr class="hover:bg-blue-50 transition-colors">';
                bodyHTML += `<td class="px-4 py-2 whitespace-nowrap font-medium text-gray-900 border-r border-gray-100">${row.date}</td>`;
                runners.forEach(runner => {
                    let val = row[runner];
                    let text = val > 0 ? val.toFixed(2) : '<span class="text-gray-300">-</span>';
                    bodyHTML += `<td class="px-4 py-2 whitespace-nowrap text-center text-gray-600">${text}</td>`;
                });
                bodyHTML += '</tr>';
            });
            tbody.innerHTML = bodyHTML;

            // สลับโชว์หน้าจอ Dashboard
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard-content').classList.remove('hidden');
        }
    </script>
</body>
</html>
