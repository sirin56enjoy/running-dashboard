<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard สถิติการวิ่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Running Dashboard
            </h1>
            <div class="flex items-center gap-4">
                <div class="text-sm font-medium text-blue-100 hidden md:block" id="last-updated">กำลังโหลดข้อมูล...</div>
                <button onclick="refreshData()" class="bg-white text-blue-600 px-4 py-2 rounded-full shadow-md text-sm font-bold hover:bg-gray-100 transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    รีเฟรชข้อมูล
                </button>
            </div>
        </div>
    </nav>

    <div id="loading" class="flex flex-col justify-center items-center h-64 mt-10">
        <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-16 w-16 mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-600">กำลังซิงค์ข้อมูลจาก Sheets...</h2>
    </div>

    <div id="dashboard-content" class="max-w-7xl mx-auto px-4 py-8 hidden">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-blue-500 transform transition hover:-translate-y-1">
                <h3 class="text-sm font-medium text-gray-500 mb-1">ระยะทางรวมทั้งหมด (กม.)</h3>
                <div class="text-4xl font-bold text-gray-800" id="kpi-total-distance">0.00</div>
            </div>
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-green-500 transform transition hover:-translate-y-1">
                <h3 class="text-sm font-medium text-gray-500 mb-1">นักวิ่งที่ระยะทางเยอะที่สุด</h3>
                <div class="text-3xl font-bold text-gray-800" id="kpi-top-runner">-</div>
                <div class="text-sm text-green-600 font-bold mt-1 bg-green-50 inline-block px-2 py-1 rounded-lg" id="kpi-top-distance">0.00 กม.</div>
            </div>
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-purple-500 transform transition hover:-translate-y-1">
                <h3 class="text-sm font-medium text-gray-500 mb-1">จำนวนนักวิ่งทั้งหมด (คน)</h3>
                <div class="text-4xl font-bold text-gray-800" id="kpi-total-runners">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow p-6">
                <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">🏆 Leaderboard (รวมทั้งหมด)</h2>
                <canvas id="barChart" height="250"></canvas>
            </div>
            <div class="bg-white rounded-xl shadow p-6">
                <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">📈 แนวโน้มการวิ่งรายวัน</h2>
                <canvas id="lineChart" height="250"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow p-6 border-t-4 border-blue-400">
                <h2 class="text-lg font-bold text-blue-700 mb-4 flex items-center gap-2">👨 Leaderboard (ผู้ชาย)</h2>
                <canvas id="maleBarChart" height="220"></canvas>
            </div>
            <div class="bg-white rounded-xl shadow p-6 border-t-4 border-pink-400">
                <h2 class="text-lg font-bold text-pink-600 mb-4 flex items-center gap-2">👩 Leaderboard (ผู้หญิง)</h2>
                <canvas id="femaleBarChart" height="220"></canvas>
            </div>
        </div>

        <!-- นำตารางข้อมูลกลับมา และเอาข้อความสีแดงออกแล้ว -->
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex flex-col md:flex-row justify-between items-center bg-gray-50">
                <h2 class="text-lg font-bold text-gray-700">ตารางสถิติรายวัน</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200" id="data-table">
                    <thead class="bg-gray-100" id="table-head"></thead>
                    <tbody class="bg-white divide-y divide-gray-200 text-sm" id="table-body"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const sheetId = '1hBZ3083B2RrPkbHouKzT1m-qozZVJkx_wDd-2H097vI';
        let barChartInstance = null;
        let lineChartInstance = null;
        let maleChartInstance = null;
        let femaleChartInstance = null;

        const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16', '#6366f1', '#f43f5e', '#14b8a6', '#eab308', '#d946ef', '#0ea5e9'];

        refreshData();

        function refreshData() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('dashboard-content').classList.add('hidden');
            const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&t=${new Date().getTime()}`;
            
            Papa.parse(csvUrl, {
                download: true,
                header: false,
                complete: function(results) { processData(results.data); },
                error: function(err) { showError('ไม่สามารถเชื่อมต่อข้อมูลได้'); }
            });
        }

        function processData(matrix) {
            try {
                let genderRowIdx = -1;
                let nameRowIdx = -1;

                for(let i=0; i < Math.min(10, matrix.length); i++) {
                    let firstVal = (matrix[i][0] || '').toString().trim();
                    if(firstVal.includes('เพศ') || firstVal.toUpperCase().includes('SEX')) genderRowIdx = i;
                    if(firstVal.includes('วัน') || firstVal.toUpperCase().includes('DATE')) nameRowIdx = i;
                }

                if(nameRowIdx === -1) { genderRowIdx = 0; nameRowIdx = 1; }

                const genders = genderRowIdx !== -1 ? matrix[genderRowIdx] : [];
                const names = matrix[nameRowIdx];

                const runners = [];
                const runnerIndices = [];
                const maleList = [];
                const femaleList = [];
                
                for(let i = 1; i < names.length; i++) {
                    let rawName = (names[i] || '').trim();
                    if(rawName !== '') {
                        runners.push(rawName);
                        runnerIndices.push(i);
                        
                        let gender = (genders[i] || '').trim().toUpperCase();
                        if(gender === 'M' || gender.includes('ช')) {
                            maleList.push(rawName.toUpperCase());
                        } else if(gender === 'F' || gender.includes('ญ')) {
                            femaleList.push(rawName.toUpperCase());
                        }
                    }
                }
                
                const cleanData = [];
                let totalDistance = 0;
                let runnerTotals = {};
                runners.forEach(r => runnerTotals[r] = 0);
                
                for(let i = nameRowIdx + 1; i < matrix.length; i++) {
                    let row = matrix[i];
                    if (!row || row.length === 0 || (row.length === 1 && !row[0])) continue;

                    let dateVal = (row[0] || '').trim();
                    let skipWords = ['รวม', 'total', 'sum', 'ซ่อน', 'hide', 'หมายเหตุ', 'note'];
                    if (!dateVal || skipWords.some(word => dateVal.toLowerCase().includes(word))) continue;
                    
                    let rowData = { date: dateVal };
                    let hasDataInRow = false;
                    
                    runners.forEach((runner, idx) => {
                        let originalIndex = runnerIndices[idx];
                        let valRaw = (row[originalIndex] || '').toString().replace(/,/g, '').trim();
                        let valNum = parseFloat(valRaw);
                        if (isNaN(valNum)) valNum = 0;
                        
                        rowData[runner] = valNum;
                        if (valNum > 0) hasDataInRow = true;
                        runnerTotals[runner] += valNum;
                        totalDistance += valNum;
                    });
                    
                    if (hasDataInRow || dateVal) cleanData.push(rowData);
                }
                
                renderDashboard(cleanData, runners, runnerTotals, totalDistance, maleList, femaleList);
            } catch (err) { console.error(err); showError('รูปแบบข้อมูลใน Sheet ไม่ถูกต้อง'); }
        }

        function showError(msg) {
            document.getElementById('loading').innerHTML = `<div class="text-red-600 font-bold text-center bg-red-50 p-8 rounded-2xl border-2 border-red-200">${msg}</div>`;
        }

        function renderDashboard(cleanData, runners, runnerTotals, totalDistance, maleList, femaleList) {
            let topRunner = '-';
            let topDistance = 0;
            for (const [runner, distance] of Object.entries(runnerTotals)) {
                if (distance > topDistance) { topDistance = distance; topRunner = runner; }
            }

            document.getElementById('kpi-total-distance').innerText = totalDistance.toFixed(2);
            document.getElementById('kpi-top-runner').innerText = topRunner.toUpperCase();
            document.getElementById('kpi-top-distance').innerText = `${topDistance.toFixed(2)} กม.`;
            document.getElementById('kpi-total-runners').innerText = runners.length;
            document.getElementById('last-updated').innerText = `อัปเดตล่าสุด: ${new Date().toLocaleTimeString('th-TH')}`;

            const sortedRunners = [...runners].sort((a, b) => runnerTotals[b] - runnerTotals[a]);
            const maleRunners = sortedRunners.filter(r => maleList.includes(r.toUpperCase()));
            const femaleRunners = sortedRunners.filter(r => femaleList.includes(r.toUpperCase()));

            if (barChartInstance) barChartInstance.destroy();
            barChartInstance = new Chart(document.getElementById('barChart').getContext('2d'), {
                type: 'bar',
                data: { labels: sortedRunners.map(r => r.toUpperCase()), datasets: [{ data: sortedRunners.map(r => runnerTotals[r]), backgroundColor: '#3b82f6', borderRadius: 4 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            if (maleChartInstance) maleChartInstance.destroy();
            maleChartInstance = new Chart(document.getElementById('maleBarChart').getContext('2d'), {
                type: 'bar',
                data: { labels: maleRunners.map(r => r.toUpperCase()), datasets: [{ data: maleRunners.map(r => runnerTotals[r]), backgroundColor: '#60a5fa', borderRadius: 4 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            if (femaleChartInstance) femaleChartInstance.destroy();
            femaleChartInstance = new Chart(document.getElementById('femaleBarChart').getContext('2d'), {
                type: 'bar',
                data: { labels: femaleRunners.map(r => r.toUpperCase()), datasets: [{ data: femaleRunners.map(r => runnerTotals[r]), backgroundColor: '#f472b6', borderRadius: 4 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            const lineDatasets = runners.map((runner, index) => ({
                label: runner, data: cleanData.map(row => row[runner]), borderColor: colors[index % colors.length], backgroundColor: colors[index % colors.length] + '30', tension: 0.3, borderWidth: 2, pointRadius: 3
            }));
            if (lineChartInstance) lineChartInstance.destroy();
            lineChartInstance = new Chart(document.getElementById('lineChart').getContext('2d'), {
                type: 'line', data: { labels: cleanData.map(row => row.date), datasets: lineDatasets },
                options: { responsive: true, interaction: { mode: 'index', intersect: false }, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { family: 'Prompt' } } } } }
            });

            // นำโค้ดสำหรับสร้างตารางกลับมา
            let headHTML = '<tr><th class="px-4 py-3 text-left text-xs font-bold text-gray-600 bg-gray-200 whitespace-nowrap">วันที่</th>';
            runners.forEach(runner => { headHTML += `<th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase">${runner}</th>`; });
            document.getElementById('table-head').innerHTML = headHTML + '</tr>';

            let bodyHTML = '';
            cleanData.forEach(row => {
                bodyHTML += `<tr class="hover:bg-blue-50"><td class="px-4 py-2 font-medium border-r border-gray-100 whitespace-nowrap">${row.date}</td>`;
                runners.forEach(runner => {
                    let val = row[runner];
                    bodyHTML += `<td class="px-4 py-2 text-center text-gray-600">${val > 0 ? val.toFixed(2) : '<span class="text-gray-300">-</span>'}</td>`;
                });
                bodyHTML += '</tr>';
            });
            document.getElementById('table-body').innerHTML = bodyHTML;

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard-content').classList.remove('hidden');
        }
    </script>
</body>
</html>
