<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard สถิติการวิ่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Running Dashboard
            </h1>
            <div class="flex items-center gap-4">
                <div class="text-sm font-medium text-blue-100 hidden md:block" id="last-updated">กำลังโหลดข้อมูล...</div>
                <button onclick="refreshData()" class="bg-white text-blue-600 px-4 py-2 rounded-full shadow-md text-sm font-bold hover:bg-gray-100 transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    รีเฟรชข้อมูล
                </button>
            </div>
        </div>
    </nav>

    <div id="loading" class="flex flex-col justify-center items-center h-64 mt-10">
        <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-16 w-16 mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-600">กำลังซิงค์ข้อมูลจาก Sheets...</h2>
    </div>

    <div id="dashboard-content" class="max-w-7xl mx-auto px-4 py-8 hidden">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-blue-500 transform transition hover:-translate-y-1">
                <h3 class="text-sm font-medium text-gray-500 mb-1">ระยะทางรวมทั้งหมด (กม.)</h3>
                <div class="text-4xl font-bold text-gray-800" id="kpi-total-distance">0.00</div>
            </div>
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-green-500 transform transition hover:-translate-y-1">
                <h3 class="text-sm font-medium text-gray-500 mb-1">นักวิ่งที่ระยะทางเยอะที่สุด</h3>
                <div class="text-3xl font-bold text-gray-800" id="kpi-top-runner">-</div>
                <div class="text-sm text-green-600 font-bold mt-1 bg-green-50 inline-block px-2
